global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "recording_rules.yml"
  - "alerting_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s
      api_version: v2

scrape_configs:
  # 1. PostgreSQL Exporter (базовые метрики)
  - job_name: 'postgres-exporter'
    scrape_timeout: 10s
    scrape_interval: 10s
    static_configs:
      - targets: ['postgres-exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgres'

  # 2. Prometheus
  - job_name: 'prometheus'
    scrape_timeout: 5s
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:9090']

  # 3. Node Exporter (метрики хоста)
  - job_name: 'node-exporter'
    scrape_timeout: 10s
    static_configs:
      - targets: ['node-exporter:9100']
    params:
      collect[]:
        - cpu
        - meminfo
        - filesystem
        - netdev

  # 4. Elasticsearch (метрики ELK)
  - job_name: 'elasticsearch'
    scrape_timeout: 15s
    static_configs:
      - targets: ['elasticsearch:9200']
    metrics_path: '/_prometheus/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'elasticsearch'

  # 5. Postgres Statements (медленные запросы)
  - job_name: 'postgres-statements'
    scrape_timeout: 15s
    static_configs:
      - targets: ['postgres-exporter:9187']
    metrics_path: '/metrics'
    params:
      collect[]:
        - pg_stat_statements
    relabel_configs:
      - source_labels: [__address__]
        target_label: job
        replacement: 'postgres-statements'
